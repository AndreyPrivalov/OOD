services:
  postgres:
    image: postgres:15
    container_name: ood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ood
    ports:
      - "5432:5432"
    volumes:
      - ood_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ood"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ood_postgres_data:
